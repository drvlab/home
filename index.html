<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRV Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #07041a;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transition: transform 0.15s ease;
  }

  .cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.3s ease, width 0.3s, height 0.3s, border-color 0.3s;
    transform: translate(-12px, -12px);
  }

  .cursor-ring.hover {
    width: 60px;
    height: 60px;
    transform: translate(-22px, -22px);
    border-color: rgba(180,80,255,0.7);
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.12;
    pointer-events: none;
    z-index: 1;
  }

  /* Ambient glow bg */
  .bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(120,40,220,0.22) 0%, rgba(30,10,80,0.18) 50%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Label name */
  .label-name {
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.3s forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label-drv {
    font-family: 'Syncopate', sans-serif;
    font-weight: 700;
    font-size: clamp(12px, 1.6vw, 18px);
    color: rgba(255,255,255,0.92);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: block;
    line-height: 1.1;
  }

  .label-lab {
    font-family: 'Syncopate', sans-serif;
    font-weight: 400;
    font-size: clamp(12px, 1.6vw, 18px);
    color: rgba(255,255,255,0.38);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: block;
    line-height: 1.1;
  }

  /* Logo wrapper */
  .logo-link {
    display: block;
    position: relative;
    width: clamp(220px, 38vmin, 420px);
    height: clamp(220px, 38vmin, 420px);
    border-radius: 50%;
    text-decoration: none;
    opacity: 0;
    animation: fadeIn 1.4s ease 0.6s forwards;
    transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
    overflow: visible;
  }

  .logo-link:hover {
    transform: scale(1.04);
  }

  /* Outer ring that pulses */
  .logo-link::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(180,80,255,0);
    transition: border-color 0.5s ease, inset 0.5s ease;
  }

  .logo-link:hover::before {
    inset: -20px;
    border-color: rgba(180,80,255,0.35);
  }

  /* Second pulsing ring */
  .logo-link::after {
    content: '';
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    border: 1px solid rgba(180,80,255,0);
    transition: border-color 0.7s ease 0.1s, inset 0.7s ease 0.1s;
  }

  .logo-link:hover::after {
    inset: -44px;
    border-color: rgba(180,80,255,0.15);
  }

  .logo-img-wrap {
    position: absolute;
    inset: 0;
    z-index: 2;
    border-radius: 50%;
    overflow: hidden;
    opacity: 0;
  }

  .logo-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
    object-fit: cover;
    filter: brightness(1.05) saturate(1.1);
    transition: filter 1.5s ease;
  }

  .logo-img.distorting {
    filter: brightness(1.15) saturate(1.25) url(#gravity);
  }

  .radar-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    z-index: 3;
    pointer-events: none;
  }

  /* Slow spin ambient overlay on logo */
  .logo-spin {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 70%, rgba(180,80,255,0.06) 100%);
    animation: spinSlow 20s linear infinite;
    pointer-events: none;
    z-index: 4;
  }

  /* Radar rings — expand outward, always visible */
  .radar-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(160,80,255,0.55);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    animation: radarPulse 3.6s ease-out infinite;
  }
  .radar-ring:nth-child(3) { animation-delay: 1.2s; }
  .radar-ring:nth-child(4) { animation-delay: 2.4s; }

  @keyframes radarPulse {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.65; }
    100% { transform: translate(-50%,-50%) scale(2.9); opacity: 0; }
  }

  /* Releases hint */
  .releases-hint {
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 1vw, 11px);
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-top: 3.2rem;
    opacity: 0;
    animation: fadeUp 1.2s ease 1s forwards;
    transition: color 0.4s ease;
  }

  .logo-link:hover ~ .releases-hint {
    color: rgba(180,80,255,0.5);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.94); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Scanline subtle */
  @keyframes scanline {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="gravity" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="turbulence" type="turbulence" baseFrequency="0.015 0.015" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feComposite in="displaced" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
</svg>

<div style="position:absolute;opacity:0;pointer-events:none;font-family:'Syncopate';font-weight:700;">DRV</div>
<div style="position:absolute;opacity:0;pointer-events:none;font-family:'Syncopate';font-weight:400;">LAB</div>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg-glow"></div>
<div class="scanlines"></div>

<div class="container">
  <div class="label-name">
    <span class="label-drv">DRV</span>
    <span class="label-lab">LAB</span>
  </div>

  <a class="logo-link" href="#" id="logoLink" title="Releases — coming soon">
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <canvas class="radar-canvas" id="radarCanvas"></canvas>
    <div class="logo-img-wrap" id="logoWrap">
      <img class="logo-img" id="logoImg" src="DRVlgo1_3.png" alt="DRV Lab logo">
    </div>
    <div class="logo-spin"></div>
  </a>

  <span class="releases-hint" id="hint">releases</span>
</div>

<script>
  // --- Cursor ---
  const cursor   = document.getElementById('cursor');
  const ring     = document.getElementById('cursorRing');
  const logoLink = document.getElementById('logoLink');
  const logoImg  = document.getElementById('logoImg');

  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.transform = `translate(${mx-4}px,${my-4}px)`;
  });
  (function animRing() {
    rx += (mx-rx)*0.1; ry += (my-ry)*0.1;
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
    requestAnimationFrame(animRing);
  })();

  // --- Radar sweep canvas ---
  const radarCanvas = document.getElementById('radarCanvas');

  function resizeRadar() {
    const rect = logoLink.getBoundingClientRect();
    const s = Math.round(rect.width);
    const dpr = window.devicePixelRatio || 1;
    radarCanvas.width  = s * dpr;
    radarCanvas.height = s * dpr;
    radarCanvas.style.width  = s + 'px';
    radarCanvas.style.height = s + 'px';
  }
  window.addEventListener('load', resizeRadar);
  resizeRadar();
  window.addEventListener('resize', resizeRadar);

  let sweepAngle = -Math.PI / 2; // start at top
  let lastTs = null;
  const SWEEP_PERIOD = 9000; // ms per rotation — slow

  function drawSweep(ts) {
    if (!lastTs) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;

    sweepAngle += (dt / SWEEP_PERIOD) * Math.PI * 2;

    const dpr = window.devicePixelRatio || 1;
    const s = radarCanvas.width / dpr;
    const cx = s / 2, cy = s / 2, r = s / 2 - 1;
    const ctx = radarCanvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, s, s);

    // Clip to circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();

    // Stepped trail: 6 steps of 10° each, progressively more transparent going back
    const stepRad = (10 / 180) * Math.PI;
    const steps = 6;
    for (let i = steps; i >= 1; i--) {
      const a1 = sweepAngle - i * stepRad;
      const a2 = sweepAngle - (i - 1) * stepRad;
      const alpha = (1 - i / (steps + 1)) * 0.16;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, a1, a2);
      ctx.closePath();
      ctx.fillStyle = `rgba(160,60,255,${alpha.toFixed(3)})`;
      ctx.fill();
    }

    // Bright trailing wedge (last 12°)
    const brightRad = (12 / 180) * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, sweepAngle - brightRad, sweepAngle);
    ctx.closePath();
    const grd2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grd2.addColorStop(0, 'rgba(180,80,255,0.0)');
    grd2.addColorStop(1, 'rgba(200,120,255,0.28)');
    ctx.fillStyle = grd2;
    ctx.fill();

    // Sweep line — from center to edge
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(sweepAngle) * r, cy + Math.sin(sweepAngle) * r);
    ctx.strokeStyle = 'rgba(210,130,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(200,100,255,0.8)';
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.restore();
    requestAnimationFrame(drawSweep);
  }
  requestAnimationFrame(drawSweep);

  // --- Photo show/hide + gravity distortion + 10s auto-hide ---
  const turbulence   = document.getElementById('turbulence');
  const displacement = turbulence ? turbulence.nextElementSibling : null;
  let warpScale    = 0;
  let warpTarget   = 0;
  let hideTimer    = null;
  let photoVisible = false;

  const logoWrap = document.getElementById('logoWrap');

  function showPhoto() {
    clearTimeout(hideTimer);
    photoVisible = true;
    logoWrap.style.transition = 'opacity 12s ease';
    logoWrap.style.opacity = '1';
    radarCanvas.style.transition = 'opacity 12s ease';
    radarCanvas.style.opacity = '0';
  }

  function startHideTimer() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      photoVisible = false;
      warpTarget = 0;
      logoImg.classList.remove('distorting');
      logoWrap.style.transition = 'opacity 14s ease';
      logoWrap.style.opacity = '0';
      radarCanvas.style.transition = 'opacity 14s ease';
      radarCanvas.style.opacity = '1';
    }, 10000);
  }

  logoLink.addEventListener('mouseenter', () => {
    showPhoto();
    warpTarget = 28;
    logoImg.classList.add('distorting');
    ring.classList.add('hover');
  });

  logoLink.addEventListener('mouseleave', () => {
    warpTarget = 0;
    logoImg.classList.remove('distorting');
    ring.classList.remove('hover');
    if (photoVisible) startHideTimer();
  });

  logoLink.addEventListener('mousemove', () => {
    if (photoVisible) {
      clearTimeout(hideTimer);
      startHideTimer();
    }
  });

  // Animate warp
  function animateWarp() {
    warpScale += (warpTarget - warpScale) * 0.07;
    if (displacement) displacement.setAttribute('scale', warpScale.toFixed(2));
    const bf = 0.015 + Math.sin(Date.now() * 0.0004) * 0.004;
    if (turbulence) turbulence.setAttribute('baseFrequency', `${bf.toFixed(4)} ${(bf * 0.7).toFixed(4)}`);
    requestAnimationFrame(animateWarp);
  }
  animateWarp();

  // --- Click hint ---
  // Measure each char position in DRV and align LAB chars under them
  function alignTitle() {
    const drv = document.getElementById('labelDrv');
    const lab = document.getElementById('labelLab');
    if (!drv || !lab) return;

    const cs   = getComputedStyle(drv);
    const font = cs.fontWeight + ' ' + cs.fontSize + ' ' + cs.fontFamily;
    const cvs  = document.createElement('canvas');
    const ctx  = cvs.getContext('2d');
    ctx.font   = font;

    // Measure position of D, R, V in DRV
    const drvText = 'DRV';
    let positions = [];
    let acc = 0;
    for (let i = 0; i < drvText.length; i++) {
      positions.push(acc);
      acc += ctx.measureText(drvText[i]).width + parseFloat(cs.letterSpacing);
    }

    // Measure L width in LAB (regular weight)
    const cs2  = getComputedStyle(lab);
    const font2 = cs2.fontWeight + ' ' + cs2.fontSize + ' ' + cs2.fontFamily;
    ctx.font   = font2;
    // offset = position of D = 0, so LAB starts at same x → no offset needed
    // BUT bold D is wider than regular L — compute the difference
    ctx.font = font; // bold
    const wD = ctx.measureText('D').width;
    ctx.font = font2; // regular
    const wL = ctx.measureText('L').width;
    // Center L under D: shift = (wD - wL) / 2
    const shift = (wD - wL) / 2;
    lab.style.paddingLeft = shift + 'px';
  }

  window.addEventListener('load', alignTitle);
  window.addEventListener('resize', alignTitle);
  logoLink.addEventListener('click', e => {
    e.preventDefault();
    const hint = document.getElementById('hint');
    hint.style.color = 'rgba(180,80,255,0.8)';
    hint.textContent = 'coming soon';
    setTimeout(() => { hint.style.color=''; hint.textContent='releases'; }, 2000);
  });

  // --- Wave pulse on logo when each ring crosses scale ~1.05 (just leaving the image edge) ---
  // Each ring has duration 3600ms, delay 0/1200/2400ms
  // Ring is at scale=1 at t=0, we trigger pulse right at start (scale=1 = border of image)
  const RING_DURATION = 3600;
  const RING_DELAYS   = [0, 1200, 2400];

  function schedulePulses() {
    RING_DELAYS.forEach(delay => {
      // Fire once immediately at delay, then every RING_DURATION
      function fire() {
        pulseImage();
        setTimeout(fire, RING_DURATION);
      }
      setTimeout(fire, delay);
    });
  }
  schedulePulses();

  let pulsing = false;
  function pulseImage() {
    if (pulsing) return;
    pulsing = true;
    logoImg.style.transition = 'transform 0.6s cubic-bezier(0.25,0,0.1,1), filter 0.6s ease-out';
    logoImg.style.transform  = 'scale(1.025)';
    logoImg.style.filter     = 'brightness(1.18) saturate(1.3)';
    setTimeout(() => {
      logoImg.style.transition = 'transform 1.1s cubic-bezier(0.1,0,0.25,1), filter 1.1s ease-in';
      logoImg.style.transform  = 'scale(1)';
      logoImg.style.filter     = 'brightness(1.05) saturate(1.1)';
      setTimeout(() => { pulsing = false; }, 1100);
    }, 600);
  }
</script>
</body>
</html>
