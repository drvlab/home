<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRV Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #07041a;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transition: transform 0.15s ease;
  }

  .cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.3s ease, width 0.3s, height 0.3s, border-color 0.3s;
    transform: translate(-12px, -12px);
  }

  .cursor-ring.hover {
    width: 60px;
    height: 60px;
    transform: translate(-22px, -22px);
    border-color: rgba(180,80,255,0.7);
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    opacity: 0.12;
    pointer-events: none;
    z-index: 1;
  }

  /* Ambient glow bg */
  .bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(120,40,220,0.22) 0%, rgba(30,10,80,0.18) 50%, transparent 75%);
    pointer-events: none;
    z-index: 0;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Label name — top */
  .label-name {
    font-family: 'Syncopate', sans-serif;
    font-weight: 700;
    font-size: clamp(11px, 1.8vw, 18px);
    letter-spacing: 0.55em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.3s forwards;
  }

  /* Logo wrapper */
  .logo-link {
    display: block;
    position: relative;
    width: clamp(220px, 38vmin, 420px);
    height: clamp(220px, 38vmin, 420px);
    border-radius: 50%;
    text-decoration: none;
    opacity: 0;
    animation: fadeIn 1.4s ease 0.6s forwards;
    transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
    overflow: visible;
  }

  .logo-link:hover {
    transform: scale(1.04);
  }

  /* Outer ring that pulses */
  .logo-link::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(180,80,255,0);
    transition: border-color 0.5s ease, inset 0.5s ease;
  }

  .logo-link:hover::before {
    inset: -20px;
    border-color: rgba(180,80,255,0.35);
  }

  /* Second pulsing ring */
  .logo-link::after {
    content: '';
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    border: 1px solid rgba(180,80,255,0);
    transition: border-color 0.7s ease 0.1s, inset 0.7s ease 0.1s;
  }

  .logo-link:hover::after {
    inset: -44px;
    border-color: rgba(180,80,255,0.15);
  }

  .logo-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
    position: relative;
    z-index: 2;
    filter: brightness(1.05) saturate(1.1);
    transition: filter 0.5s ease;
  }

  .logo-link:hover .logo-img {
    filter: brightness(1.15) saturate(1.25);
  }

  /* Slow spin ambient overlay on logo */
  .logo-spin {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 70%, rgba(180,80,255,0.06) 100%);
    animation: spinSlow 20s linear infinite;
    pointer-events: none;
    z-index: 3;
  }

  /* Radar rings — expand outward */
  .radar-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(160,80,255,0.55);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    animation: radarPulse 3.6s ease-out infinite;
  }
  .radar-ring:nth-child(2) { animation-delay: 1.2s; }
  .radar-ring:nth-child(3) { animation-delay: 2.4s; }

  @keyframes radarPulse {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.65; }
    100% { transform: translate(-50%,-50%) scale(2.9); opacity: 0; }
  }

  /* Releases hint */
  .releases-hint {
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px, 1vw, 11px);
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-top: 3.2rem;
    opacity: 0;
    animation: fadeUp 1.2s ease 1s forwards;
    transition: color 0.4s ease;
  }

  .logo-link:hover ~ .releases-hint {
    color: rgba(180,80,255,0.5);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.94); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Scanline subtle */
  @keyframes scanline {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg-glow"></div>
<div class="scanlines"></div>

<div class="container">
  <span class="label-name">DRV Lab</span>

  <a class="logo-link" href="#" id="logoLink" title="Releases — coming soon">
    <img class="logo-img" id="logoImg" src="DRVlogo1.png" alt="DRV Lab logo">
    <div class="logo-spin"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
    <div class="radar-ring"></div>
  </a>

  <span class="releases-hint" id="hint">releases</span>
</div>

<script>
  // --- Cursor ---
  const cursor   = document.getElementById('cursor');
  const ring     = document.getElementById('cursorRing');
  const logoLink = document.getElementById('logoLink');
  const logoImg  = document.getElementById('logoImg');

  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.transform = `translate(${mx-4}px,${my-4}px)`;
  });
  (function animRing() {
    rx += (mx-rx)*0.1; ry += (my-ry)*0.1;
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
    requestAnimationFrame(animRing);
  })();
  logoLink.addEventListener('mouseenter', () => ring.classList.add('hover'));
  logoLink.addEventListener('mouseleave', () => ring.classList.remove('hover'));

  // --- Click hint ---
  logoLink.addEventListener('click', e => {
    e.preventDefault();
    const hint = document.getElementById('hint');
    hint.style.color = 'rgba(180,80,255,0.8)';
    hint.textContent = 'coming soon';
    setTimeout(() => { hint.style.color=''; hint.textContent='releases'; }, 2000);
  });

  // --- Wave pulse on logo when each ring crosses scale ~1.05 (just leaving the image edge) ---
  // Each ring has duration 3600ms, delay 0/1200/2400ms
  // Ring is at scale=1 at t=0, we trigger pulse right at start (scale=1 = border of image)
  const RING_DURATION = 3600;
  const RING_DELAYS   = [0, 1200, 2400];

  function schedulePulses() {
    RING_DELAYS.forEach(delay => {
      // Fire once immediately at delay, then every RING_DURATION
      function fire() {
        pulseImage();
        setTimeout(fire, RING_DURATION);
      }
      setTimeout(fire, delay);
    });
  }
  schedulePulses();

  let pulsing = false;
  function pulseImage() {
    if (pulsing) return;
    pulsing = true;
    logoImg.style.transition = 'transform 0.6s cubic-bezier(0.25,0,0.1,1), filter 0.6s ease-out';
    logoImg.style.transform  = 'scale(1.025)';
    logoImg.style.filter     = 'brightness(1.18) saturate(1.3)';
    setTimeout(() => {
      logoImg.style.transition = 'transform 1.1s cubic-bezier(0.1,0,0.25,1), filter 1.1s ease-in';
      logoImg.style.transform  = 'scale(1)';
      logoImg.style.filter     = 'brightness(1.05) saturate(1.1)';
      setTimeout(() => { pulsing = false; }, 1100);
    }, 600);
  }
</script>
</body>
</html>
